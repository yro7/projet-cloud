# Valeurs Helm pour le chart kube-prometheus-stack (release: kube-prometheus)
# Appliquer : helm upgrade kube-prometheus prometheus-community/kube-prometheus-stack \
#               -n monitoring -f k8s/prometheus/values.yaml
grafana:
  adminPassword: admin
  # Plugin panneau "nid d'abeille" (hexagones) pour la vue Overview des noeuds.
  plugins:
    - grafana-polystat-panel
  # Le sidecar importe automatiquement les ConfigMaps labellisés grafana_dashboard=1
  # (voir k8s/prometheus/honeycomb-dashboard.yaml).
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

# Scrape des métriques HDFS via l'endpoint natif Hadoop /prom
# (active par hadoop.prometheus.endpoint.enabled=true dans core-site.xml).
# Le pod Prometheus joint les IP des noeuds (10.0.1.x) en SNAT -> firewall interne OK.
prometheus:
  prometheusSpec:
    additionalScrapeConfigs:
      - job_name: hdfs-namenode
        metrics_path: /prom
        static_configs:
          - targets: ['10.0.1.10:9870']
            labels:
              hdfs_role: namenode
              node: k8s-master
      - job_name: hdfs-datanodes
        metrics_path: /prom
        static_configs:
          - targets: ['10.0.1.11:9864']
            labels:
              hdfs_role: datanode
              node: k8s-worker-1
          - targets: ['10.0.1.12:9864']
            labels:
              hdfs_role: datanode
              node: k8s-worker-2
