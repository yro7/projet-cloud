apiVersion: v1
data:
  honeycomb-dashboard.json: "{\n  \"uid\": \"node-honeycomb\",\n  \"title\": \"Cluster\
    \ - Vue Nid d'Abeille (CPU)\",\n  \"tags\": [\"projet-cloud\", \"nodes\", \"honeycomb\"\
    ],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 39,\n  \"version\": 0,\n\
    \  \"refresh\": \"5s\",\n  \"time\": { \"from\": \"now-15m\", \"to\": \"now\"\
    \ },\n  \"panels\": [\n    {\n      \"id\": 1,\n      \"type\": \"grafana-polystat-panel\"\
    ,\n      \"title\": \"Noeuds du Cluster K8s - Usage CPU (hover = detail)\",\n\
    \      \"gridPos\": { \"h\": 10, \"w\": 24, \"x\": 0, \"y\": 0 },\n      \"datasource\"\
    : { \"type\": \"prometheus\", \"uid\": \"prometheus\" },\n      \"targets\": [\n\
    \        {\n          \"refId\": \"A\",\n          \"datasource\": { \"type\"\
    : \"prometheus\", \"uid\": \"prometheus\" },\n          \"expr\": \"100 * (1 -\
    \ avg by(instance)(rate(node_cpu_seconds_total{mode=\\\"idle\\\"}[2m]))) * on(instance)\
    \ group_left(nodename) node_uname_info\",\n          \"legendFormat\": \"{{nodename}}\"\
    ,\n          \"instant\": false,\n          \"range\": true\n        }\n     \
    \ ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"\
    percent\", \"min\": 0, \"max\": 100,\n          \"thresholds\": { \"mode\": \"\
    absolute\", \"steps\": [\n            { \"color\": \"green\", \"value\": 0 },\n\
    \            { \"color\": \"orange\", \"value\": 50 },\n            { \"color\"\
    : \"red\", \"value\": 80 }\n          ] }\n        },\n        \"overrides\":\
    \ []\n      },\n      \"options\": {\n        \"globalAutoScaleFonts\": true,\n\
    \        \"globalDisplayMode\": \"all\",\n        \"globalFillColor\": \"#0a50a1\"\
    ,\n        \"globalGradientsEnabled\": true,\n        \"globalOperatorName\":\
    \ \"current\",\n        \"globalShape\": \"hexagon_pointed_top\",\n        \"\
    globalShowValueEnabled\": true,\n        \"globalTextFontAutoColor\": true,\n\
    \        \"globalTextFontSize\": 16,\n        \"globalThresholdsConfig\": [\n\
    \          { \"color\": \"#299c46\", \"state\": 0, \"value\": 0 },\n         \
    \ { \"color\": \"#e5ac0e\", \"state\": 1, \"value\": 50 },\n          { \"color\"\
    : \"#bf1b00\", \"state\": 2, \"value\": 80 }\n        ],\n        \"globalTooltipsEnabled\"\
    : true,\n        \"globalTooltipsValueEnabled\": \"all\",\n        \"globalUnitFormat\"\
    : \"percent\",\n        \"globalPolygonBorderColor\": \"black\",\n        \"globalPolygonBorderSize\"\
    : 2,\n        \"polystatColumns\": 3,\n        \"polystatColumnsAutoSize\": true,\n\
    \        \"polystatRows\": 1,\n        \"polystatRowsAutoSize\": true,\n     \
    \   \"radius\": 0,\n        \"radiusAutoSize\": true,\n        \"savedComposites\"\
    : [],\n        \"savedOverrides\": [],\n        \"sortByDirection\": 1,\n    \
    \    \"sortByField\": \"name\"\n      }\n    },\n    {\n      \"id\": 2,\n   \
    \   \"type\": \"grafana-polystat-panel\",\n      \"title\": \"Pods Executors Spark\
    \ - CPU (LIVE autoscaling : les cases apparaissent/disparaissent)\",\n      \"\
    gridPos\": { \"h\": 12, \"w\": 24, \"x\": 0, \"y\": 10 },\n      \"datasource\"\
    : { \"type\": \"prometheus\", \"uid\": \"prometheus\" },\n      \"targets\": [\n\
    \        {\n          \"refId\": \"A\",\n          \"datasource\": { \"type\"\
    : \"prometheus\", \"uid\": \"prometheus\" },\n          \"expr\": \"label_replace(100\
    \ * sum by(pod)(rate(container_cpu_usage_seconds_total{namespace=\\\"default\\\
    \", pod=~\\\".*-exec-.*\\\", container!=\\\"\\\", container!=\\\"POD\\\"}[1m])),\
    \ \\\"pod\\\", \\\"$1\\\", \\\"pod\\\", \\\".*-(exec-[0-9]+)$\\\")\",\n      \
    \    \"legendFormat\": \"{{pod}}\",\n          \"instant\": false,\n         \
    \ \"range\": true\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\"\
    : {\n          \"unit\": \"percent\", \"min\": 0, \"max\": 100,\n          \"\
    thresholds\": { \"mode\": \"absolute\", \"steps\": [\n            { \"color\"\
    : \"green\", \"value\": 0 },\n            { \"color\": \"orange\", \"value\":\
    \ 50 },\n            { \"color\": \"red\", \"value\": 90 }\n          ] }\n  \
    \      },\n        \"overrides\": []\n      },\n      \"options\": {\n       \
    \ \"globalAutoScaleFonts\": true,\n        \"globalDisplayMode\": \"all\",\n \
    \       \"globalFillColor\": \"#0a50a1\",\n        \"globalGradientsEnabled\"\
    : true,\n        \"globalOperatorName\": \"current\",\n        \"globalShape\"\
    : \"hexagon_pointed_top\",\n        \"globalShowValueEnabled\": true,\n      \
    \  \"globalTextFontAutoColor\": true,\n        \"globalTextFontSize\": 14,\n \
    \       \"globalThresholdsConfig\": [\n          { \"color\": \"#299c46\", \"\
    state\": 0, \"value\": 0 },\n          { \"color\": \"#e5ac0e\", \"state\": 1,\
    \ \"value\": 50 },\n          { \"color\": \"#bf1b00\", \"state\": 2, \"value\"\
    : 90 }\n        ],\n        \"globalTooltipsEnabled\": true,\n        \"globalTooltipsValueEnabled\"\
    : \"all\",\n        \"globalUnitFormat\": \"percent\",\n        \"globalPolygonBorderColor\"\
    : \"black\",\n        \"globalPolygonBorderSize\": 2,\n        \"polystatColumns\"\
    : 5,\n        \"polystatColumnsAutoSize\": true,\n        \"polystatRows\": 1,\n\
    \        \"polystatRowsAutoSize\": true,\n        \"radius\": 0,\n        \"radiusAutoSize\"\
    : true,\n        \"savedComposites\": [],\n        \"savedOverrides\": [],\n \
    \       \"sortByDirection\": 1,\n        \"sortByField\": \"name\"\n      }\n\
    \    }\n  ]\n}\n"
kind: ConfigMap
metadata:
  annotations:
    k8s-sidecar-target-directory: /tmp/dashboards/projet-cloud
  labels:
    grafana_dashboard: '1'
  name: honeycomb-dashboard
  namespace: monitoring

