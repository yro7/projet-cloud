apiVersion: v1
kind: ConfigMap
metadata:
  annotations:
    k8s-sidecar-target-directory: /tmp/dashboards/projet-cloud
  labels:
    grafana_dashboard: "1"
  name: honeycomb-dashboard
  namespace: monitoring
data:
  honeycomb-dashboard.json: |
    {
      "uid": "node-honeycomb",
      "title": "Cluster - Vue Nid d'Abeille (CPU + HDFS)",
      "tags": ["projet-cloud", "nodes", "honeycomb", "spark", "hdfs"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 0,
      "refresh": "5s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "grafana-polystat-panel",
          "title": "Noeuds du Cluster K8s - Usage CPU (hover = detail)",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "100 * (1 - avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[2m]))) * on(instance) group_left(nodename) node_uname_info",
              "legendFormat": "{{nodename}}",
              "instant": false,
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "orange",
                    "value": 50
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "globalAutoScaleFonts": true,
            "globalDisplayMode": "all",
            "globalFillColor": "#0a50a1",
            "globalGradientsEnabled": true,
            "globalOperatorName": "current",
            "globalShape": "hexagon_pointed_top",
            "globalShowValueEnabled": true,
            "globalTextFontAutoColor": true,
            "globalTextFontSize": 16,
            "globalThresholdsConfig": [
              {
                "color": "#299c46",
                "state": 0,
                "value": 0
              },
              {
                "color": "#e5ac0e",
                "state": 1,
                "value": 50
              },
              {
                "color": "#bf1b00",
                "state": 2,
                "value": 80
              }
            ],
            "globalTooltipsEnabled": true,
            "globalTooltipsValueEnabled": "all",
            "globalUnitFormat": "percent",
            "globalPolygonBorderColor": "black",
            "globalPolygonBorderSize": 2,
            "polystatColumns": 3,
            "polystatColumnsAutoSize": true,
            "polystatRows": 1,
            "polystatRowsAutoSize": true,
            "radius": 0,
            "radiusAutoSize": true,
            "savedComposites": [],
            "savedOverrides": [],
            "sortByDirection": 1,
            "sortByField": "name"
          }
        },
        {
          "id": 2,
          "type": "grafana-polystat-panel",
          "title": "Pods Executors Spark - CPU (LIVE autoscaling : les cases apparaissent/disparaissent)",
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 10
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "label_replace(100 * sum by(pod)(rate(container_cpu_usage_seconds_total{namespace=\"default\", pod=~\".*-exec-.*\", container!=\"\", container!=\"POD\"}[1m])), \"pod\", \"$1\", \"pod\", \".*-(exec-[0-9]+)$\")",
              "legendFormat": "{{pod}}",
              "instant": false,
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "orange",
                    "value": 50
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "globalAutoScaleFonts": true,
            "globalDisplayMode": "all",
            "globalFillColor": "#0a50a1",
            "globalGradientsEnabled": true,
            "globalOperatorName": "current",
            "globalShape": "hexagon_pointed_top",
            "globalShowValueEnabled": true,
            "globalTextFontAutoColor": true,
            "globalTextFontSize": 14,
            "globalThresholdsConfig": [
              {
                "color": "#299c46",
                "state": 0,
                "value": 0
              },
              {
                "color": "#e5ac0e",
                "state": 1,
                "value": 50
              },
              {
                "color": "#bf1b00",
                "state": 2,
                "value": 90
              }
            ],
            "globalTooltipsEnabled": true,
            "globalTooltipsValueEnabled": "all",
            "globalUnitFormat": "percent",
            "globalPolygonBorderColor": "black",
            "globalPolygonBorderSize": 2,
            "polystatColumns": 5,
            "polystatColumnsAutoSize": true,
            "polystatRows": 1,
            "polystatRowsAutoSize": true,
            "radius": 0,
            "radiusAutoSize": true,
            "savedComposites": [],
            "savedOverrides": [],
            "sortByDirection": 1,
            "sortByField": "name"
          }
        },
        {
          "id": 3,
          "type": "grafana-polystat-panel",
          "title": "DataNodes HDFS - Stockage utilise (hover = detail)",
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 22
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "100 * (1 - (org_apache_hadoop_hdfs_server_datanode_fsdataset_impl_fs_dataset_impl_remaining{job=\"hdfs-datanodes\"} / org_apache_hadoop_hdfs_server_datanode_fsdataset_impl_fs_dataset_impl_capacity{job=\"hdfs-datanodes\"}))",
              "legendFormat": "{{hostname}}",
              "instant": false,
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "orange",
                    "value": 60
                  },
                  {
                    "color": "red",
                    "value": 85
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "globalAutoScaleFonts": true,
            "globalDisplayMode": "all",
            "globalFillColor": "#0a50a1",
            "globalGradientsEnabled": true,
            "globalOperatorName": "current",
            "globalShape": "hexagon_pointed_top",
            "globalShowValueEnabled": true,
            "globalTextFontAutoColor": true,
            "globalTextFontSize": 15,
            "globalThresholdsConfig": [
              {
                "color": "#299c46",
                "state": 0,
                "value": 0
              },
              {
                "color": "#e5ac0e",
                "state": 1,
                "value": 60
              },
              {
                "color": "#bf1b00",
                "state": 2,
                "value": 85
              }
            ],
            "globalTooltipsEnabled": true,
            "globalTooltipsValueEnabled": "all",
            "globalUnitFormat": "percent",
            "globalPolygonBorderColor": "black",
            "globalPolygonBorderSize": 2,
            "polystatColumns": 2,
            "polystatColumnsAutoSize": true,
            "polystatRows": 1,
            "polystatRowsAutoSize": true,
            "radius": 0,
            "radiusAutoSize": true,
            "savedComposites": [],
            "savedOverrides": [],
            "sortByDirection": 1,
            "sortByField": "name"
          }
        }
      ]
    }
